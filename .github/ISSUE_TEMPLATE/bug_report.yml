name: Bug Report
description: Report a single bug, visual issue, AI issue, or regression
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🚨 One issue = one bug
        This report must cover **one specific problem** (or a tightly related
        group on the same animal/system). If you have multiple unrelated bugs,
        open multiple issues. Mega-lists will be closed.

        **Account / ban / payment issues** don't belong here — use
        [Support Tickets](https://support.vexxusarts.com/submit-ticket/2-mopeio).

  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I searched open and closed issues and this is not a duplicate
          required: true
        - label: This report covers ONE bug or a set of closely related bugs on the same animal/system
          required: true
        - label: I included steps to reproduce below
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Gameplay bug (ability, mechanic, interaction)
        - Visual / animation / asset bug
        - AI / pathing bug
        - Collision / physics bug
        - Regression (used to work, now broken)
        - Performance / technical issue
        - Other
    validations:
      required: true

  - type: input
    id: animal
    attributes:
      label: Animal / Feature affected
      placeholder: "e.g., Toucan, Snail AI, Venus Flytrap"
    validations:
      required: true

  - type: input
    id: game_version
    attributes:
      label: Game version or approximate date noticed
      placeholder: "e.g., after May 2025 update, or 'has always been this way'"

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug in one or two sentences.
      placeholder: "Toucan cannot throw food after flying from under a tree."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps someone else can follow to trigger the bug.
      placeholder: |
        1. Pick Toucan
        2. Fly under a tree
        3. Grab food
        4. Leave the tree area
        5. Try to throw the food
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      placeholder: "Toucan throws the food normally."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      placeholder: "Throw does not happen. Food stays grabbed."
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: How often does this happen?
      options:
        - Always
        - Often
        - Sometimes
        - Rarely
        - Happened once
    validations:
      required: true

  - type: input
    id: context
    attributes:
      label: Context
      description: "Browser, device, biome, land/water, under tree, etc."
      placeholder: "Chrome, desktop, desert biome, under a tree"

  - type: textarea
    id: media
    attributes:
      label: Screenshots / Video / Extra notes
      description: "Paste links or drag files here. Strongly recommended for visual bugs."
